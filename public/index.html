<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Garage Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center px-4">
      <div
        class="max-w-md w-full bg-white rounded-2xl shadow-xl p-10 transform transition-all hover:scale-[1.01]"
      >
        <div class="text-center mb-10">
          <div
            class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-8 w-8 text-blue-600"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
              />
            </svg>
          </div>
          <h2 class="text-3xl font-extrabold text-gray-900">Smart Garage</h2>
          <p class="text-gray-500 mt-2">Silakan login untuk akses kontrol</p>
        </div>

<form id="loginForm" class="space-y-6">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1"
              >Username</label
            >
            <input
              type="text"
              id="username"
              placeholder="admin"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
              required
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1"
              >Password</label
            >
            <input
              type="password"
              id="password"
              placeholder="admin123"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
              required
            />
          </div>

          <button
            type="submit"
            id="loginBtn"
            class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200"
          >
            Masuk Sekarang
          </button>
        </form>

        <div id="loginMessage" class="mt-4 text-center hidden">
          <p class="text-red-500 text-sm"></p>
        </div>
      </div>
    </div>
    <script>
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const msg = document.getElementById('loginMessage');
        btn.textContent = 'Memproses...';
        btn.disabled = true;
        msg.classList.add('hidden');
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        try {
          const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
            credentials: 'include'
          });
          const data = await res.json();
          
          if (data.success) {
            window.location.href = data.redirect;
          } else {
            msg.innerHTML = '<p class="text-red-500 text-sm">Username atau password salah!</p>';
            msg.classList.remove('hidden');
          }
        } catch (err) {
          msg.innerHTML = '<p class="text-red-500 text-sm">Error koneksi server!</p>';
          msg.classList.remove('hidden');
        } finally {
          btn.textContent = 'Masuk Sekarang';
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
