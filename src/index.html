<!doctype html>
<html lang="en">
  <head>
    <title>Smart Garage Monitor</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn-script.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <div class="dash-wrap">
      <div class="glass">
        <!-- HEADER -->
        <div class="dash-header">
          <div class="brand">
            <div class="badge-logo">
              <i class="fa-solid fa-camera"></i>
            </div>
            <div>
              <h5 class="brand-title">Smart Garage</h5>
              <p class="brand-sub">Security Monitoring</p>
            </div>
          </div>

          <div class="d-flex align-items-center gap-2">
            <span
              id="mqttStatus"
              style="
                font-size: 13px;
                font-weight: bold;
                color: #94a3b8;
                text-transform: uppercase;
              "
            >
              ● MQTT: OFFLINE
            </span>
          </div>
        </div>

        <!-- BODY -->
        <div class="dash-body">
          <div class="row">
            <!-- CAMERA -->
            <div class="col-lg-8">
              <div class="panel">
                <div class="panel-b">
                  <div class="cam-container">
                    <div class="cam-overlay">
                      <div class="dot"></div>
                      LIVE
                    </div>
                    <img
                      id="camera-stream"
                      src="http://192.168.0.100:81/stream"
                      onerror="
                        this.src =
                          'https://placehold.co/640x360/000000/FFFFFF?text=Disconnected'
                      "
                    />
                  </div>

                  <div class="mt-3">
                    <button
                      onclick="refreshCam()"
                      class="btn btn-outline-light btn-sm rounded-pill w-100"
                    >
                      <i class="fa-solid fa-sync me-1"></i> Refresh Stream
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- CONTROL + HISTORY -->
            <div class="col-lg-4">
              <!-- CONTROL PANEL -->
              <div class="panel">
                <div class="panel-h">Kontrol Gate</div>
                <div class="panel-b">
                  <div class="d-grid gap-2">
                    <button id="open" class="btn btn-success btn-xl">
                      BUKA
                    </button>
                    <button id="close" class="btn btn-danger btn-xl">
                      TUTUP
                    </button>

                    <div class="row g-2 mt-1">
                      <div class="col-6">
                        <button
                          id="lockBtn"
                          class="btn btn-warning btn-sm w-100 text-dark"
                        >
                          LOCK
                        </button>
                      </div>
                      <div class="col-6">
                        <button
                          id="unlockBtn"
                          class="btn btn-info btn-sm w-100 text-dark"
                        >
                          UNLOCK
                        </button>
                      </div>
                    </div>
                  </div>

                  <div class="mt-4 pt-3 border-top border-secondary">
                    <div class="d-flex justify-content-between mb-2">
                      <span class="soft-text">GATE</span>
                      <span id="gateStatus" class="badge bg-danger">
                        TERTUTUP
                      </span>
                    </div>

                    <div class="d-flex justify-content-between">
                      <span class="soft-text">LOCK</span>
                      <span id="lockStatus" class="badge bg-secondary">
                        UNKNOWN
                      </span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- HISTORY PANEL -->
              <div class="panel mt-3">
                <div class="panel-h">History Aktivitas</div>
                <div
                  class="panel-b"
                  style="max-height: 250px; overflow-y: auto"
                >
                  <ul id="historyList" class="list-group list-group-flush"></ul>
                    <!-- Data history muncul di sini -->
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/websocket.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
